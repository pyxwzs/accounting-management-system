version: "3.8"

services:
  mysql:
    image: mysql:5.7
    container_name: accounting_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234.
      MYSQL_DATABASE: accounting_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./obt_db.sql:/docker-entrypoint-initdb.d/obt_db.sql:ro
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_bin
      - --default-time-zone=+08:00

volumes:
  mysql_data:

version: "3.8"

services:
  mysql:
    image: mysql:5.7
    container_name: accounting_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234.
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
